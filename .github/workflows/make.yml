name: make

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run checks
        run: make check

      - name: Run typing analysis
        run: make pyright

      - name: Run build
        run: make build

      - name: Run unit tests
        run: make pytest
